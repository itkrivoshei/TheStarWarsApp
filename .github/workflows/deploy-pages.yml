name: Deploy Angular app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Angular app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error

      - name: Run tests
        run: npm run test:ci

      - name: Build for GitHub Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          npm run build:pages -- --base-href "/${REPO_NAME}/"

      - name: Add SPA fallback
        run: |
          if [ -d "dist/angular-swapi-explorer/browser" ]; then
            APP_DIR="dist/angular-swapi-explorer/browser"
          else
            APP_DIR="dist/angular-swapi-explorer"
          fi

          cp "${APP_DIR}/index.html" "${APP_DIR}/404.html"
          echo "APP_DIR=${APP_DIR}" >> "${GITHUB_ENV}"

      - name: Verify build output
        run: |
          test -f "${APP_DIR}/index.html"
          test -f "${APP_DIR}/404.html"
          ls -la "${APP_DIR}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.APP_DIR }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v5
