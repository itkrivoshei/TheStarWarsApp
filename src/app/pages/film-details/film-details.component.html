<section *ngIf="film$ | async as film" class="detail-card">
  <a routerLink="/home" class="back-link">← Back to films</a>

  <div class="detail-card__header">
    <span>Episode {{ film.episode_id }}</span>
    <h1>{{ film.title }}</h1>
  </div>

  <dl class="meta-grid">
    <div>
      <dt>Director</dt>
      <dd>{{ film.director }}</dd>
    </div>
    <div>
      <dt>Producer</dt>
      <dd>{{ film.producer }}</dd>
    </div>
    <div>
      <dt>Release date</dt>
      <dd>{{ film.release_date | date }}</dd>
    </div>
  </dl>

  <article class="crawl" aria-labelledby="opening-crawl-title">
    <h2 id="opening-crawl-title">Opening crawl</h2>
    <p>{{ film.opening_crawl }}</p>
  </article>

  <section class="links-section">
    <h2>Characters</h2>
    <div class="character-grid" *ngIf="characterLinks$ | async as characters">
      <a
        *ngFor="let character of characters; trackBy: trackByCharacterId"
        [routerLink]="['/characters', character.id]"
      >
        {{ character.name }}
      </a>
    </div>
  </section>
</section>
